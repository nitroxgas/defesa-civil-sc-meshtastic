# Configuração da integração Defesa Civil SC - Meshtastic Standalone

# Conexão com o gateway Meshtastic
meshtastic:
  # Tipo de conexão: "serial" (USB/Serial) ou "tcp"
  connection_type: serial
  
  # Para conexão serial:
  # - Deixe vazio para detecção automática (recomendado em Linux/Mac)
  # - Ou especifique a porta: "/dev/ttyUSB0" (Linux), "COM3" (Windows), "/dev/ttyACM0" (Mac)
  serial_port: ""
  
  # Para conexão TCP:
  # Descomente se usar connection_type: tcp
  # Opção 1: Usando tcp_host e tcp_port (recomendado)
  # tcp_host: "192.168.1.100"
  # tcp_port: 4403
  # 
  # Opção 2: Usando host e port (também funciona)
  # host: "192.168.1.100"
  # port: 4403

# Configuração do canal Meshtastic
channel:
  # Nome ou número do canal para enviar alertas
  # Se número: usa canal direto (ex: 0, 1, 2)
  # Se string: busca canal pelo nome
  name: "Alertas-SC"
  # Número do canal (usado se name_or_number for número)
  number: 0

# Configuração do feed RSS
feed:
  # URL do feed
  url: "https://www.defesacivil.sc.gov.br/categoria/alerta/feed/"
  # Intervalo fixo de polling em minutos. Se 0 ou omitido, usa 1/4 do período
  # informado pelo feed (ex: hourly -> 15 min, daily -> 360 min).
  interval_minutes: 0
  # Timeout para requisição HTTP (segundos)
  timeout_seconds: 30

# Armazenamento de estado
state:
  # Arquivo JSON para persistir estado local
  file: "./state.json"
  # Número máximo de alertas a armazenar
  max_history: 10

# Resposta a mensagens diretas (DM)
direct_message:
  # Ativar resposta a DM
  enabled: true
  # Palavra-chave para solicitar alertas
  trigger_word: "ALERTAS"
  # Número de alertas a devolver
  max_alerts_reply: 2

# Modo de teste
test_mode: false

# Logging
logging:
  # Nível: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: DEBUG
  # Arquivo de log (deixe vazio para apenas console)
  file: "./defesa_civil_sc_alertas.log"
